# Publish platform-specific PyPI wheels after a GitHub Release is created.
#
# Each wheel contains the pre-built rwv binary in its .data/scripts/ directory,
# so that pip/uv/pipx install it directly into the user's PATH.  No Python
# wrapper or Rust toolchain is required on the install side.
#
# Uses OIDC (OpenID Connect) via PyPI trusted publishing — no stored tokens.
#
# One-time setup required:
#   PyPI: add a trusted publisher at pypi.org/manage/project/repoweave/settings/publishing/
#         (publisher: GitHub, repo: cwalv/repoweave, workflow: publish-shims.yml)
name: Publish PyPI package

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write  # Required for PyPI OIDC

jobs:
  # Build one platform-specific wheel per Rust target.
  build-wheel:
    # Only run when the Release workflow succeeded on a version tag.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_branch, 'v') ||
       contains(github.event.workflow_run.head_branch, '.'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            plat_tag: macosx_11_0_arm64
            artifact: repoweave-aarch64-apple-darwin.tar.xz
            bin: rwv
          - rust_target: x86_64-apple-darwin
            plat_tag: macosx_10_12_x86_64
            artifact: repoweave-x86_64-apple-darwin.tar.xz
            bin: rwv
          - rust_target: aarch64-unknown-linux-gnu
            plat_tag: manylinux_2_17_aarch64.manylinux2014_aarch64
            artifact: repoweave-aarch64-unknown-linux-gnu.tar.xz
            bin: rwv
          - rust_target: x86_64-unknown-linux-gnu
            plat_tag: manylinux_2_17_x86_64.manylinux2014_x86_64
            artifact: repoweave-x86_64-unknown-linux-gnu.tar.xz
            bin: rwv
          - rust_target: x86_64-pc-windows-msvc
            plat_tag: win_amd64
            artifact: repoweave-x86_64-pc-windows-msvc.zip
            bin: rwv.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ matrix.artifact }}" \
            --dir /tmp/artifacts/

      - name: Extract binary
        run: |
          mkdir -p /tmp/bin
          artifact="/tmp/artifacts/${{ matrix.artifact }}"
          if [[ "${{ matrix.artifact }}" == *.zip ]]; then
            unzip -o -j "$artifact" "${{ matrix.bin }}" -d /tmp/bin/
          else
            # tar.xz: archive directory matches artifact name without extension
            tar -xJf "$artifact" -C /tmp/artifacts/
            archive_dir="${{ matrix.artifact }}"
            archive_dir="${archive_dir%.tar.xz}"
            cp "/tmp/artifacts/${archive_dir}/${{ matrix.bin }}" "/tmp/bin/${{ matrix.bin }}"
            chmod +x "/tmp/bin/${{ matrix.bin }}"
          fi

      - name: Build platform wheel
        run: |
          mkdir -p dist/
          python python/build_wheels.py \
            --version "${{ steps.version.outputs.version }}" \
            --binary "/tmp/bin/${{ matrix.bin }}" \
            --platform "${{ matrix.plat_tag }}" \
            --out dist/
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.rust_target }}
          path: dist/*.whl
          retention-days: 1

  # Build the sdist (platform-independent source distribution).
  build-sdist:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_branch, 'v') ||
       contains(github.event.workflow_run.head_branch, '.'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Get version from tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/repoweave/pyproject.toml

      - name: Build sdist
        run: |
          cd python/repoweave
          python -m build --sdist --outdir "$GITHUB_WORKSPACE/dist/"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 1

  # Publish all wheels + sdist to PyPI in a single job to stay within
  # the OIDC trusted-publisher constraint (one upload per workflow run).
  publish-pypi:
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi  # optional: gate behind a required-reviewer environment

    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
